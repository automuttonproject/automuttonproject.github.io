<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ひつじのあしあと — automutton</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f4f0;
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      border-bottom: 1px solid #d8d5cc;
      background: #f5f4f0;
    }

    header h1 {
      font-size: 15px;
      font-weight: normal;
      letter-spacing: 0.15em;
      color: #2a2a2a;
    }

    header span {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #888;
    }

    .pdf-container {
      flex: 1;
      display: flex;
    }

    embed, iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .fallback {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      color: #555;
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    .fallback a {
      color: #2a2a2a;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>
  <header>
    <h1>ひつじのあしあと</h1>
    <span>automutton</span>
  </header>

  <div class="pdf-container">
    <embed src="current.pdf" type="application/pdf" id="pdf-embed">
  </div>

  <div class="fallback" id="fallback">
    <p>PDFを表示できない場合は下記からご覧ください。</p>
    <a href="current.pdf" download>ダウンロード</a>
  </div>

  <script>
    const embed = document.getElementById('pdf-embed');
    const fallback = document.getElementById('fallback');
    embed.addEventListener('error', () => {
      embed.parentElement.style.display = 'none';
      fallback.style.display = 'flex';
    });
  </script>
</body>
</html>
